project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "topics/**/*.qmd"
    - "posts/**/*.qmd"

website:
  title: "sanxi"
  site-url: "https://sunjiaxi378-stack.github.io/sanxi/"
  description: "记录学习、生活、情绪、复盘与成长。"

  navbar:
    title: "sanxi"
    background: light
    foreground: dark
    search: true

    left:
      - text: "首页"
        href: index.qmd

      - text: "专题"
        menu:
          - text: "专题首页"
            href: topics/index.qmd
          - text: "算法图解"
            href: topics/algorithm/index.qmd
          - text: "MATLAB 学习"
            href: topics/matlab/index.qmd

      - text: "笔记"
        menu:
          - text: "学习笔记总览"
            href: notes.qmd
          - text: "算法笔记"
            href: topics/algorithm/index.qmd
          - text: "MATLAB 笔记"
            href: topics/matlab/index.qmd

      - text: "日志"
        href: journal.qmd

      - text: "文章"
        menu:
          - text: "欢迎文章"
            href: posts/welcome/index.qmd

    right:
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/sunjiaxi378-stack/sanxi
        aria-label: GitHub

  page-footer:
    center: "© 2026 sanxi · 记录学习，也记录自己。"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-location: right
    number-sections: false
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    mainfont: "Microsoft YaHei"
    monofont: "Consolas"

execute:
  freeze: auto