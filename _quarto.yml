project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "topics/**/*.qmd"
    - "posts/**/*.qmd"

lang: zh

website:
  title: "sanxi"
  site-url: "https://sunjiaxi378-stack.github.io/sanxi/"
  description: "记录学习、生活、情绪、复盘与成长。"

  navbar:
    title: "sanxi"
    background: light
    foreground: dark
    search: true

    left:
      - text: "首页"
        href: index.qmd

      - text: "专题"
        menu:
          - text: "专题首页"
            href: topics/index.qmd
          - text: "数学建模"
            href: topics/math-modeling/index.qmd
          - text: "数值分析"
            href: topics/numerical-analysis/index.qmd
          - text: "算法图解"
            href: topics/algorithm/index.qmd

      - text: "编程"
        menu:
          - text: "MATLAB"
            href: topics/matlab/index.qmd
          - text: "Python"
            href: topics/python/index.qmd
          - text: "Mathematical"
            href: topics/mathematical/index.qmd

      - text: "日志"
        href: journal.qmd

      - text: "文章"
        href: posts/welcome/index.qmd

    right:
      - href: xinliu.qmd
        text: 心流
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/sunjiaxi378-stack/sanxi
        aria-label: GitHub

  page-footer:
    center: "© 2026 sanxi · 记录学习，也记录自己。"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    number-sections: false
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    mainfont: "Microsoft YaHei"
    monofont: "Consolas"

execute:
  freeze: auto

resources:
  - assets/data/journal_tasks.csv
  - assets/data/journal_records.csv
  - assets/data/mood.csv
  - assets/img/xinliu-bg.jpg
  - assets/img/home-bg.jpg
  - assets/js/journal-system.js
  - assets/js/xinliu.js